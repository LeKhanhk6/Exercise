<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Ex8</title>
</head>
<body>
    <div class="container g-4 w-50 mt-4 border">
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <button type="button" class="btn-close mt-2" style="font-size:10px;" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <h1>Form đặt vé máy bay</h1>
        <div class="container-fluid g-0 pb-4">
            <form class="row g-3">
                <div class="col-12">
                    <label for="inputName" class="form-label">Họ tên</label>
                    <div class="input-group">
                        <span class="input-group-text" id="icon"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="inputName" placeholder="Họ Tên">
                        <span class="input-group-text" id="money">vnđ</span>
                    </div>
                    <div id="inputName" class="form-text">
                        Phải nhập từ 5 ký tự, in hoa....
                    </div> 
                </div>
                <div class="col-12">
                    <label for="inputAddress" class="form-label">Địa chỉ</label>
                    <input type="text" class="form-control" id="inputAddress">
                    <div id="inputAddress" class="form-text">
                        Phải nhập từ 5 ký tự, in hoa....
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="inputStateF" class="form-label">Đi từ</label>
                    <select id="inputStateF" class="form-select">
                    <option selected>Hà Nội</option>
                    <option>...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="inputStateT" class="form-label">Đến</label>
                    <select id="inputStateT" class="form-select">
                    <option selected>Hà Nội</option>
                    <option>...</option>
                    </select>
                </div>
                <div class="col-12">
                    <p>Chọn chiều đi (khứ hồi)</p>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck1">
                        <label class="form-check-label" for="gridCheck1">Đi</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck2">
                        <label class="form-check-label" for="gridCheck2">Về</label>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100">Đặt vé</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
