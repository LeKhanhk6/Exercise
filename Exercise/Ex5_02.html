<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>Ex5_02</title>
</head>
<body>
    <div class="container">
        <div class="p-5 text-center mb-4" style="background: #d3d7db">
            <h1 class="display-6 fw-normal">My First Bootstrap Page</h1>
        </div>

        <div class="container text-center">
            <div class="row m-5">

                <div class="col-4">
                    <picture>
                        <source srcset="https://upload.wikimedia.org/wikipedia/commons/3/38/HTML5_Badge.svg" type="image/svg+xml">
                        <img src="https://www.w3.org/html/logo/badge/html5-badge-h-solo.png" class="img-fluid w-100 h-100" alt="HTML5 Logo">
                    </picture>
                </div>

                <div class="col-4">
                    <picture>
                        <source srcset="https://upload.wikimedia.org/wikipedia/commons/6/62/CSS3_logo.svg" type="image/svg+xml">
                        <img src="https://logowik.com/content/uploads/images/css-icon5555.logowik.com.webp" class="img-fluid w-100 h-100" alt="CSS3 Logo">
                    </picture>
                </div>

                <div class="col-4">
                    <picture>
                        <source srcset="https://upload.wikimedia.org/wikipedia/commons/b/b2/Bootstrap_logo.svg" type="image/svg+xml">
                        <img src="https://logospng.org/wp-content/uploads/bootstrap.png" class="img-fluid w-100 h-100" alt="Bootstrap Logo">
                    </picture>
                </div>

            </div>
        </div>
    </div>
    <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
